disabled_rules:
 - file_length
 - opening_brace
 - type_body_length
 - function_body_length
 - cyclomatic_complexity
 - blanket_disable_command
 - multiple_closures_with_trailing_closure

opt_in_rules:
 - force_try
 - force_unwrapping

force_try:
 severity: error

force_unwrapping:
 severity: error

line_length:
 warning: 120
 error: 120

custom_rules:
 no_unchecked_sendable:
  name: "No @unchecked Sendable"
  regex: "@unchecked\\s+Sendable"
  message: "@unchecked Sendable is banned - use a real Sendable value type, an actor, or Mutex."
  severity: error
 no_nslock:
  name: "No NSLock"
  regex: "\\bNSLock\\b"
  message: "NSLock is banned - use Mutex (Synchronization) instead."
  severity: error
 scope_reducer_child_shorthand:
  name: "Scope child shorthand"
  regex: 'Scope\([^)]*\)\s*\{\s*[A-Z]\w*\(\)\s*\}'
  message: "Use Scope(state:action:child: Reducer.init) instead of expanding a closure for a single bare Reducer()."
  severity: error
 foreach_reducer_element_shorthand:
  name: "forEach element shorthand"
  regex: 'forEach\([^)]*\)\s*\{\s*[A-Z]\w*\(\)\s*\}'
  message: "Use .forEach(_:action:element: Reducer.init) instead of expanding a closure for a single bare Reducer()."
  severity: error

excluded:
 - EhPanda/App/Generated
